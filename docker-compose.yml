version: '3.8'
services:
  web:
    # Menggunakan image yang sudah kita push ke Docker Hub, bukan build lokal lagi
    image: ${IMAGE_NAME:-docker.io/jibon/node-login-app}:latest
    ports:
      - "3000:3000"
    environment:
      - DB_USER=myuser
      - DB_HOST=db
      - DB_NAME=mydb
      - DB_PASSWORD=mypassword
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

  db:
    # Membangun image postgres kustom yang sudah berisi init.sql
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5