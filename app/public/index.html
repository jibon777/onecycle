<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneCycle Core - Secure Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <div id="root" class="min-h-screen flex flex-col justify-between"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [usernameInput, setUsernameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [authLoading, setAuthLoading] = useState(false);

            useEffect(() => {
                fetch('/api/session')
                    .then(res => res.json())
                    .then(data => {
                        if (data.loggedIn) setUser(data.username);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setAuthLoading(true);

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: usernameInput, password: passwordInput })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        setUser(data.username);
                        setPasswordInput('');
                    } else {
                        setErrorMsg(data.message);
                    }
                } catch (err) {
                    setErrorMsg('Gagal terhubung ke server.');
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = async () => {
                const response = await fetch('/api/logout', { method: 'POST' });
                const data = await response.json();
                if (data.success) setUser(null);
            };

            if (loading) {
                return (
                    <div class="flex items-center justify-center min-h-screen">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div class="flex-grow flex items-center justify-center p-4">
                        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 p-8 rounded-2xl shadow-2xl w-full max-w-md">
                            <div class="text-center mb-8">
                                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 text-white text-2xl shadow-lg mb-4">
                                    <i class="fa-solid fa-arrows-spin animate-pulse"></i>
                                </div>
                                <h2 class="text-2xl font-bold tracking-tight text-white">OneCycle Portal</h2>
                                <p class="text-sm text-slate-400 mt-1">Frontend & Backend Berhasil Dipisah</p>
                            </div>

                            {errorMsg && (
                                <div class="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-sm mb-5 flex items-center gap-2">
                                    <i class="fa-solid fa-circle-exclamation"></i>
                                    <span>{errorMsg}</span>
                                </div>
                            )}

                            <form onSubmit={handleLogin} class="space-y-5">
                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                                            <i class="fa-solid fa-user"></i>
                                        </span>
                                        <input type="text" required value={usernameInput} onChange={(e) => setUsernameInput(e.target.value)} placeholder="Username" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500"/>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                                    <div class="relative">
                                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                                            <i class="fa-solid fa-lock"></i>
                                        </span>
                                        <input type="password" required value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="••••••••" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500"/>
                                    </div>
                                </div>

                                <button type="submit" disabled={authLoading} class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium text-sm py-3 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 disabled:opacity-50">
                                    {authLoading ? <div class="h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent"></div> : <><span>Sign In</span><i class="fa-solid fa-arrow-right text-xs"></i></>}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div class="flex-grow flex flex-col">
                    <header class="bg-slate-900/40 backdrop-blur-md border-b border-slate-900 px-6 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white font-bold"><i class="fa-solid fa-layer-group"></i></div>
                            <span class="font-bold tracking-wide text-white">OneCycle Control Center</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm text-slate-300">User: <strong class="text-white font-medium">{user}</strong></span>
                            <button onClick={handleLogout} class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-medium py-2 px-4 rounded-lg border border-slate-700 flex items-center gap-2"><i class="fa-solid fa-right-from-bracket"></i>Sign Out</button>
                        </div>
                    </header>

                    <main class="flex-grow p-6 max-w-7xl w-full mx-auto space-y-6">
                        <div class="bg-gradient-to-r from-indigo-900/40 via-purple-900/20 to-slate-900/60 border border-indigo-500/10 rounded-2xl p-6 shadow-xl">
                            <h1 class="text-2xl font-bold text-white">Selamat Datang, {user}!</h1>
                            <p class="text-sm text-indigo-200/70 mt-1">Arsitektur baru berhasil diterapkan. Frontend React.js melayani UI secara independen, dan Backend Express melayani data API secara bersih.</p>
                        </div>
                    </main>
                    <footer class="bg-slate-950/40 border-t border-slate-900/60 text-center py-4 text-xs text-slate-500">&copy; 2026 OneCycle CI/CD Suite.</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
